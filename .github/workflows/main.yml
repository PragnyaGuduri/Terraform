name: Terraform CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: echo "Cloning repository..."

      - name: Terraform Init
        run: echo "terraform init"

      - name: Terraform Apply
        run: echo "terraform apply -auto-approve"

      - name: Deploy MongoDB
        run: echo "MongoDB deployed successfully"
